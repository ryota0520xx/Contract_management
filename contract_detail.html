<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>契約詳細 | Contract Admin</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js" defer></script>
    <style>
      [v-cloak] {
        display: none;
      }
      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-slate-100 text-slate-800 antialiased h-screen overflow-hidden"
  >
    <div id="app" v-cloak class="h-full flex flex-col">
      <nav
        class="bg-gradient-to-r from-blue-900 via-blue-800 to-indigo-900 text-white shadow-xl px-8 py-4 flex-shrink-0 z-10 border-b border-white/10"
      >
        <div class="w-full flex justify-between items-center">
          <h1 class="text-2xl font-bold tracking-tight drop-shadow-sm">
            契約管理くん
          </h1>
          <a
            href="/"
            class="text-sm font-bold text-blue-100 hover:text-white transition bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full"
            >一覧に戻る</a
          >
        </div>
      </nav>

      <main class="flex-1 flex overflow-hidden relative">
        <div
          v-if="loading"
          class="w-full h-full flex flex-col justify-center items-center"
        >
          <div
            class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700 mx-auto"
          ></div>
          <p class="mt-4 text-slate-500">読み込み中...</p>
        </div>

        <div v-else-if="contract" class="w-full h-full flex">
          <!-- PDF Viewer Area (Left/Center) -->
          <div class="flex-1 bg-slate-200 relative overflow-hidden">
            <div v-if="contract.pdf_path" class="w-full h-full">
              <iframe
                :src="contract.pdf_path"
                class="w-full h-full"
                title="PDF Viewer"
                loading="lazy"
              ></iframe>
            </div>
            <div
              v-else
              class="w-full h-full flex flex-col items-center justify-center text-slate-400"
            >
              <svg
                class="w-12 h-12 mb-2 opacity-50"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                width="48"
                height="48"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
              <p>PDFファイルは登録されていません</p>
            </div>
          </div>

          <!-- Management Items (Right Sidebar) -->
          <div
            class="w-96 bg-white border-l border-slate-200 shadow-2xl flex flex-col z-20"
          >
            <!-- サイドバーヘッダー -->
            <div
              class="px-6 py-4 border-b border-slate-100 bg-slate-50/80 backdrop-blur flex items-center gap-2 sticky top-0 z-10"
            >
              <svg
                class="w-5 h-5 text-blue-600"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                ></path>
              </svg>
              <h2 class="font-bold text-slate-800 text-sm tracking-wide">
                契約書詳細
              </h2>
            </div>

            <div class="flex-1 overflow-y-auto p-6 space-y-8">
              <!-- 基本情報 -->
              <div class="space-y-5">
                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >契約タイトル</label
                  >
                  <input
                    type="text"
                    v-model="contract.title"
                    @change="updateField('title')"
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-800 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                    placeholder="タイトルを入力"
                  />
                </div>
                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >顧客名</label
                  >
                  <input
                    type="text"
                    v-model="contract.client_name"
                    @change="updateField('client_name')"
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                    placeholder="顧客名を入力"
                  />
                </div>
                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >フォルダ</label
                  >
                  <select
                    v-model="contract.folder_id"
                    @change="updateField('folder_id')"
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm appearance-none"
                    style="
                      background-image: url('data:image/svg+xml,%3csvg xmlns=\'http://www.w3.org/2000/svg\' fill=\'none\' viewBox=\'0 0 20 20\'%3e%3cpath stroke=\'%236b7280\' stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'1.5\' d=\'M6 8l4 4 4-4\'/%3e%3c/svg%3e');
                      background-position: right 0.5rem center;
                      background-repeat: no-repeat;
                      background-size: 1.5em 1.5em;
                      padding-right: 2.5rem;
                    "
                  >
                    <option :value="null">未分類 (ルート)</option>
                    <option v-for="f in flatFolders" :key="f.id" :value="f.id">
                      {{ '- '.repeat(f.level) + f.name }}
                    </option>
                  </select>
                </div>
              </div>

              <hr class="border-slate-100" />

              <!-- 契約条件 -->
              <div class="space-y-5">
                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >契約金額</label
                  >
                  <div class="relative">
                    <span
                      class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium"
                      >¥</span
                    >
                    <input
                      type="text"
                      v-model.lazy="displayAmount"
                      @change="updateField('amount')"
                      class="w-full pl-7 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-lg font-bold text-slate-800 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                      placeholder="0"
                    />
                  </div>
                </div>

                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >契約締結日</label
                  >
                  <input
                    type="date"
                    v-model="contract.contract_date"
                    @change="updateField('contract_date')"
                    class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                  />
                </div>
                <div>
                  <label
                    class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                    >契約期間</label
                  >
                  <div class="grid grid-cols-2 gap-3">
                    <div>
                      <span
                        class="text-[10px] font-bold text-slate-400 block mb-1"
                        >開始</span
                      >
                      <input
                        type="date"
                        v-model="contract.start_date"
                        @change="updateField('start_date')"
                        class="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                      />
                    </div>
                    <div>
                      <span
                        class="text-[10px] font-bold text-slate-400 block mb-1"
                        >終了</span
                      >
                      <input
                        type="date"
                        v-model="contract.end_date"
                        @change="updateField('end_date')"
                        class="w-full px-2 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs font-medium text-slate-700 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm"
                      />
                    </div>
                  </div>
                </div>
                <div>
                  <div
                    class="flex items-center p-3 bg-slate-50 rounded-lg border border-slate-200/60"
                  >
                    <input
                      id="auto_renewal"
                      type="checkbox"
                      v-model="contract.auto_renewal"
                      @change="updateField('auto_renewal')"
                      class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer"
                    />
                    <label
                      for="auto_renewal"
                      class="ml-2 text-sm font-medium text-slate-700 cursor-pointer select-none"
                      >自動更新する</label
                    >
                  </div>
                </div>
              </div>

              <hr class="border-slate-100" />

              <!-- 要約 -->
              <div class="space-y-3">
                <div>
                  <div class="flex justify-between items-center mb-1">
                    <label
                      class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5"
                      >契約要約</label
                    >
                    <button
                      @click="reanalyzeSummary"
                      :disabled="isAnalyzing || !contract.pdf_path"
                      class="text-[10px] font-bold bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded transition flex items-center gap-1 disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                      <svg
                        v-if="!isAnalyzing"
                        class="w-3 h-3"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                        ></path>
                      </svg>
                      <svg
                        v-else
                        class="animate-spin w-3 h-3"
                        fill="none"
                        viewBox="0 0 24 24"
                      >
                        <circle
                          class="opacity-25"
                          cx="12"
                          cy="12"
                          r="10"
                          stroke="currentColor"
                          stroke-width="4"
                        ></circle>
                        <path
                          class="opacity-75"
                          fill="currentColor"
                          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                        ></path>
                      </svg>
                      {{ isAnalyzing ? '解析中...' : '再生成' }}
                    </button>
                  </div>
                  <div
                    class="p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm text-slate-600 whitespace-pre-wrap leading-relaxed shadow-inner"
                  >
                    {{ contract.summary || '要約なし' }}
                  </div>
                </div>
              </div>
            </div>

            <div
              class="p-4 bg-white border-t border-slate-100 sticky bottom-0 z-10"
            >
              <a
                v-if="contract.pdf_path"
                :href="contract.pdf_path"
                download
                class="flex items-center justify-center w-full px-4 py-3 bg-white border border-slate-300 rounded-xl text-sm font-bold text-slate-700 hover:bg-slate-50 hover:text-blue-600 hover:border-blue-300 transition shadow-sm group"
              >
                <svg
                  class="w-4 h-4 mr-2 text-slate-400 group-hover:text-blue-500 transition"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                  ></path>
                </svg>
                PDFをダウンロード
              </a>
            </div>
          </div>
        </div>

        <div
          v-else
          class="w-full h-full flex flex-col justify-center items-center bg-white"
        >
          <p class="text-red-500 font-medium">
            契約情報が見つかりませんでした。
          </p>
          <a href="/" class="inline-block mt-4 text-blue-600 hover:underline"
            >一覧に戻る</a
          >
        </div>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const { createApp, ref, onMounted, computed } = Vue;
        createApp({
          setup() {
            const contract = ref(null);
            const folders = ref([]);
            const loading = ref(true);
            const isAnalyzing = ref(false);

            const fetchContractDetails = async () => {
              const params = new URLSearchParams(window.location.search);
              const id = params.get("id");

              if (!id) {
                loading.value = false;
                return;
              }

              try {
                const res = await fetch(`/contracts/${id}`);
                if (res.ok) {
                  contract.value = await res.json();
                } else {
                  console.error("Failed to fetch contract details");
                }
              } catch (error) {
                console.error("Error fetching contract:", error);
              } finally {
                loading.value = false;
              }
            };

            const fetchFolders = async () => {
              try {
                const res = await fetch("/folders");
                if (res.ok) {
                  folders.value = await res.json();
                }
              } catch (error) {
                console.error("Error fetching folders:", error);
              }
            };

            const flatFolders = computed(() => {
              const result = [];
              const traverse = (nodes, level = 0) => {
                if (!nodes) return;
                for (const node of nodes) {
                  result.push({ ...node, level });
                  if (node.children) traverse(node.children, level + 1);
                }
              };
              traverse(folders.value);
              return result;
            });

            const displayAmount = computed({
              get: () => {
                if (!contract.value || contract.value.amount == null) return "";
                return contract.value.amount.toLocaleString();
              },
              set: (val) => {
                if (!contract.value) return;
                const num = Number(val.replace(/,/g, ""));
                contract.value.amount = isNaN(num) ? 0 : num;
              },
            });

            const updateField = async (field) => {
              if (!contract.value) return;
              try {
                const payload = { [field]: contract.value[field] };
                await fetch(`/contracts/${contract.value.id}`, {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload),
                });
              } catch (e) {
                alert("更新に失敗しました");
                console.error(e);
              }
            };

            const reanalyzeSummary = async () => {
              if (!contract.value.id || !contract.value.pdf_path) return;
              if (
                !confirm(
                  "契約書の要約をAIで再生成しますか？\n現在の要約は上書きされます。"
                )
              )
                return;

              isAnalyzing.value = true;
              try {
                const res = await fetch(
                  `/contracts/${contract.value.id}/analyze`,
                  { method: "POST" }
                );
                if (res.ok) {
                  const data = await res.json();
                  if (data.summary) {
                    contract.value.summary = data.summary;
                    await updateField("summary");
                  }
                } else {
                  const err = await res.json().catch(() => ({}));
                  alert(
                    "解析に失敗しました: " + (err.error || "サーバーエラー")
                  );
                }
              } catch (e) {
                console.error(e);
                alert("エラーが発生しました");
              } finally {
                isAnalyzing.value = false;
              }
            };

            onMounted(() => {
              fetchContractDetails();
              fetchFolders();
            });

            return {
              contract,
              loading,
              flatFolders,
              updateField,
              displayAmount,
              reanalyzeSummary,
              isAnalyzing,
            };
          },
        }).mount("#app");
      });
    </script>
  </body>
</html>
