<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contract Admin | 契約管理システム</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://unpkg.com" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js" defer></script>
    <style>
      [v-cloak] {
        display: none;
      } /* 読み込み時のチラつき防止 */
      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800 antialiased">
    <div id="app" v-cloak>
      <nav
        class="bg-gradient-to-r from-blue-900 via-blue-800 to-indigo-900 text-white shadow-xl px-8 py-4 mb-10 border-b border-white/10"
      >
        <div class="max-w-5xl mx-auto flex justify-between items-center">
          <h1 class="text-2xl font-bold tracking-tight drop-shadow-sm">
            契約管理くん
          </h1>
        </div>
      </nav>

      <main
        class="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8"
      >
        <section class="md:col-span-1">
          <div
            class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200/60"
          >
            <h2
              class="text-lg font-semibold mb-6 border-l-4 border-blue-600 pl-3"
            >
              新規契約登録
            </h2>

            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1"
                  >契約タイトル</label
                >
                <input
                  v-model="newContract.title"
                  type="text"
                  class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                  placeholder="例：システム開発委託契約"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1"
                  >顧客名</label
                >
                <input
                  v-model="newContract.client_name"
                  type="text"
                  class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                  placeholder="例：株式会社テックリード"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1"
                  >契約金額</label
                >
                <input
                  v-model.number="newContract.amount"
                  type="number"
                  class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                  placeholder="0"
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1"
                  >契約締結日</label
                >
                <input
                  v-model="newContract.contract_date"
                  type="date"
                  class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                />
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-1"
                    >契約開始日</label
                  >
                  <input
                    v-model="newContract.start_date"
                    type="date"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-1"
                    >契約終了日</label
                  >
                  <input
                    v-model="newContract.end_date"
                    type="date"
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                  />
                </div>
              </div>
              <div class="flex items-center pt-2">
                <input
                  v-model="newContract.auto_renewal"
                  id="auto_renewal"
                  type="checkbox"
                  class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500"
                />
                <label
                  for="auto_renewal"
                  class="ml-2 text-sm font-medium text-slate-600"
                  >自動更新あり</label
                >
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1"
                  >契約書 (PDF)</label
                >
                <input
                  type="file"
                  accept="application/pdf"
                  ref="fileInputRef"
                  @change="handleFileChange"
                  class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                />
              </div>
              <button
                @click="addContract"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl transition-all active:transform active:scale-95"
              >
                契約を登録する
              </button>
            </div>
          </div>
        </section>

        <section class="md:col-span-2">
          <div class="flex justify-between items-end mb-4">
            <h2 class="text-xl font-bold text-slate-700">契約一覧</h2>
            <span class="text-sm text-slate-500"
              >全 {{ contracts.length }} 件</span
            >
          </div>

          <div class="space-y-4">
            <div
              v-for="c in contracts"
              :key="c.id"
              class="bg-white px-4 py-3 rounded-xl border border-slate-200/60 shadow-sm flex justify-between items-center hover:shadow-md transition"
            >
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-3 mb-1">
                  <h3 class="font-bold text-base text-slate-800 truncate">
                    <a
                      :href="`/contract_detail.html?id=${c.id}`"
                      target="_blank"
                      class="hover:text-blue-600 hover:underline"
                    >
                      {{ c.title }}
                    </a>
                  </h3>
                  <span
                    class="text-xs text-slate-500 bg-slate-100 px-2 py-0.5 rounded flex-shrink-0"
                  >
                    {{ c.client_name }}
                  </span>
                </div>
                <div class="flex items-center gap-4 text-sm">
                  <span class="text-blue-600 font-semibold">
                    ¥{{ c.amount?.toLocaleString() }}
                  </span>
                  <a
                    v-if="c.pdf_path"
                    :href="c.pdf_path"
                    target="_blank"
                    class="inline-flex items-center text-slate-500 hover:text-blue-600 hover:underline text-xs"
                  >
                    <svg
                      class="w-3 h-3 mr-1"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"
                      ></path>
                    </svg>
                    PDF
                  </a>
                </div>
              </div>
              <button
                @click="deleteContract(c.id)"
                class="ml-4 text-red-500 hover:bg-red-50 px-3 py-1.5 text-sm rounded-lg border border-transparent hover:border-red-200 transition flex-shrink-0"
              >
                削除
              </button>
            </div>

            <div
              v-if="contracts.length === 0"
              class="text-center py-20 bg-slate-100 rounded-xl border-2 border-dashed border-slate-300"
            >
              <p class="text-slate-400">登録された契約はありません</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const { createApp, ref, onMounted } = Vue;
        createApp({
          setup() {
            const contracts = ref([]);
            const newContract = ref({
              title: "",
              client_name: "",
              amount: 0,
              contract_date: "",
              start_date: "",
              end_date: "",
              auto_renewal: false,
            });
            const pdfFile = ref(null);
            const fileInputRef = ref(null);

            const fetchContracts = async () => {
              const res = await fetch("/contracts");
              contracts.value = await res.json();
            };

            const handleFileChange = (e) => {
              pdfFile.value = e.target.files[0] || null;
            };

            const addContract = async () => {
              if (!newContract.value.title || !newContract.value.client_name)
                return alert("入力してください");

              const formData = new FormData();
              formData.append("title", newContract.value.title);
              formData.append("client_name", newContract.value.client_name);
              formData.append("amount", newContract.value.amount);
              formData.append("contract_date", newContract.value.contract_date);
              formData.append("start_date", newContract.value.start_date);
              formData.append("end_date", newContract.value.end_date);
              formData.append("auto_renewal", newContract.value.auto_renewal);
              if (pdfFile.value) {
                formData.append("pdf", pdfFile.value);
              }

              await fetch("/contracts", {
                method: "POST",
                body: formData,
              });
              newContract.value = {
                title: "",
                client_name: "",
                amount: 0,
                contract_date: "",
                start_date: "",
                end_date: "",
                auto_renewal: false,
              };
              pdfFile.value = null;
              if (fileInputRef.value) fileInputRef.value.value = "";
              fetchContracts();
            };

            const deleteContract = async (id) => {
              if (!confirm("本当に削除しますか？")) return;
              await fetch(`/contracts/${id}`, { method: "DELETE" });
              fetchContracts();
            };

            onMounted(fetchContracts);
            return {
              contracts,
              newContract,
              addContract,
              deleteContract,
              handleFileChange,
              fileInputRef,
            };
          },
        }).mount("#app");
      });
    </script>
  </body>
</html>
